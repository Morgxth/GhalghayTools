<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Переводчик — GhalghayTools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0b09;
      --surface: #161310;
      --border:  rgba(255,255,255,0.08);
      --text:    rgba(255,255,255,0.88);
      --muted:   rgba(255,255,255,0.45);
      --accent:  #c9a96e;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Jost', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    header {
      padding: 20px 32px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; letter-spacing: 0.02em; }
    .logo span { color: var(--accent); }
    .back { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .back:hover { color: var(--accent); }

    main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px; gap: 32px; max-width: 860px; margin: 0 auto; width: 100%;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 42px); font-weight: 700;
      text-align: center;
    }
    h1 em { color: var(--accent); font-style: normal; }

    .translator {
      width: 100%; display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px; align-items: start;
    }

    .pane {
      display: flex; flex-direction: column; gap: 8px;
    }

    .lang-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); padding: 0 4px;
    }

    textarea {
      width: 100%; height: 180px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
      color: var(--text); font-family: 'Jost', sans-serif; font-size: 15px;
      line-height: 1.6; resize: vertical;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: rgba(201,169,110,0.4); }
    textarea[readonly] { cursor: default; }

    .char-count {
      font-size: 11px; color: var(--muted); text-align: right; padding: 0 4px;
    }
    .char-count.warn { color: #e09060; }

    .swap-col {
      display: flex; flex-direction: column; align-items: center;
      padding-top: 28px; gap: 8px;
    }

    .swap-btn {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); cursor: pointer;
      font-size: 18px; display: grid; place-items: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .swap-btn:hover { border-color: var(--accent); color: var(--accent); }

    .translate-btn {
      padding: 12px 32px; border-radius: 99px; border: none; cursor: pointer;
      background: var(--accent); color: #0d0b09;
      font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 500;
      letter-spacing: 0.04em; transition: opacity 0.15s;
    }
    .translate-btn:hover { opacity: 0.85; }
    .translate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      font-size: 13px; color: var(--muted); min-height: 20px; text-align: center;
    }
    .status.error { color: #e07060; }

    footer {
      padding: 20px 32px; border-top: 1px solid var(--border);
      text-align: center; font-size: 12px; color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      .translator { grid-template-columns: 1fr; }
      .swap-col { flex-direction: row; padding-top: 0; justify-content: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">ГIалгIай<span>Tools</span></div>
    <a class="back" href="/">← Все инструменты</a>
  </header>

  <main>
    <h1>Переводчик<br><em>инг ↔ рус</em></h1>

    <div class="translator">
      <div class="pane">
        <div class="lang-label" id="src-label">Ингушский</div>
        <textarea id="src-text" placeholder="Введите текст..." maxlength="2000"></textarea>
        <div class="char-count" id="char-count">0 / 2000</div>
      </div>

      <div class="swap-col">
        <button class="swap-btn" id="swap-btn" title="Поменять языки">⇄</button>
        <button class="translate-btn" id="translate-btn">Перевести</button>
      </div>

      <div class="pane">
        <div class="lang-label" id="tgt-label">Русский</div>
        <textarea id="tgt-text" readonly placeholder="Перевод появится здесь..."></textarea>
      </div>
    </div>

    <div class="status" id="status"></div>
  </main>

  <footer>
    <a href="https://github.com/Morgxth/GhalghayTools" target="_blank">GitHub</a>
    &nbsp;·&nbsp; Модель: <a href="https://huggingface.co/Targimec/nllb-ingush" target="_blank">Targimec/nllb-ingush</a>
  </footer>

  <script src="/launcher.js"></script>
  <app-launcher></app-launcher>

  <script>
    const LANGS = { inh: 'inh_Cyrl', rus: 'rus_Cyrl' };
    let srcLang = 'inh';

    const srcText  = document.getElementById('src-text');
    const tgtText  = document.getElementById('tgt-text');
    const srcLabel = document.getElementById('src-label');
    const tgtLabel = document.getElementById('tgt-label');
    const charCount = document.getElementById('char-count');
    const statusEl = document.getElementById('status');
    const swapBtn  = document.getElementById('swap-btn');
    const transBtn = document.getElementById('translate-btn');

    const LABEL = { inh: 'Ингушский', rus: 'Русский' };

    function updateLabels() {
      const tgtLang = srcLang === 'inh' ? 'rus' : 'inh';
      srcLabel.textContent = LABEL[srcLang];
      tgtLabel.textContent = LABEL[tgtLang];
    }

    srcText.addEventListener('input', () => {
      const n = srcText.value.length;
      charCount.textContent = `${n} / 2000`;
      charCount.classList.toggle('warn', n > 1800);
    });

    swapBtn.addEventListener('click', () => {
      const prev = tgtText.value;
      tgtText.value = srcText.value;
      srcText.value = prev;
      srcLang = srcLang === 'inh' ? 'rus' : 'inh';
      updateLabels();
      srcText.dispatchEvent(new Event('input'));
      statusEl.textContent = '';
      statusEl.className = 'status';
    });

    transBtn.addEventListener('click', async () => {
      const text = srcText.value.trim();
      if (!text) return;

      transBtn.disabled = true;
      statusEl.textContent = 'Перевожу...';
      statusEl.className = 'status';
      tgtText.value = '';

      const tgtLang = srcLang === 'inh' ? 'rus' : 'inh';

      try {
        const res = await fetch('/translate/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            src_lang: LANGS[srcLang],
            tgt_lang: LANGS[tgtLang],
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        tgtText.value = data.translation;
        statusEl.textContent = '';
      } catch (e) {
        statusEl.textContent = `Ошибка: ${e.message}`;
        statusEl.className = 'status error';
      } finally {
        transBtn.disabled = false;
      }
    });

    updateLabels();
  </script>
</body>
</html>
