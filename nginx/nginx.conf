events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/javascript application/json;

  server {
    listen 80;

    # Railway internal DNS resolver — ленивый резолвинг при каждом запросе
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Spell-checker
    location /spell/ {
      set $spell "http://${SPELL_HOST}:${SPELL_PORT}";
      proxy_pass         $spell/spell/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Translator
    location /translate/ {
      set $translate "http://${TRANSLATE_HOST}:${TRANSLATE_PORT}";
      proxy_pass         $translate/translate/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # Landing page
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
