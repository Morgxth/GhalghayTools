events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/javascript application/json;

  # Upstream сервисы (Railway private network)
  upstream spell     { server ${SPELL_HOST}:${SPELL_PORT}; }
  upstream map       { server ${MAP_HOST}:${MAP_PORT}; }
  upstream translate { server ${TRANSLATE_HOST}:${TRANSLATE_PORT}; }

  server {
    listen 80;

    # Spell-checker
    location /spell/ {
      proxy_pass         http://spell/spell/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Translator
    location /translate/ {
      proxy_pass         http://translate/translate/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # History-map
    location /map/ {
      proxy_pass         http://map/map/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Landing page
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
