# Server
server.port=${PORT:8080}
server.servlet.context-path=/map

# Database
# Локально: localhost (Docker Compose)
# Fly.io:   переменные PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD
#           устанавливаются автоматически при `fly postgres attach`
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:ingush_history}?sslmode=${DB_SSL_MODE:disable}
spring.datasource.username=${PGUSER:ingush_user}
spring.datasource.password=${PGPASSWORD:ingush_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# CORS
# Локально: localhost dev-серверы
# Fly.io:   пустая строка — CORS не нужен (фронт и бэк на одном домене)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Logging
logging.level.com.ingush=${LOG_LEVEL:INFO}
logging.level.org.flywaydb=INFO
